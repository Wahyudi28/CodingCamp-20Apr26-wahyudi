<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Clock / Greeting Widget -->
  <section id="greeting-widget" aria-label="Greeting widget">
    <p id="time-display"></p>
    <p id="date-display"></p>
    <h1 id="greeting-text"></h1>
  </section>

  <!-- Middle row: Timer + Tasks side by side -->
  <div id="middle-row">

    <section id="timer-widget" aria-label="Focus timer widget">
      <h2>Focus Timer</h2>
      <p id="timer-display" aria-live="polite">25:00</p>
      <div class="timer-btn-row">
        <button id="timer-start-btn" aria-label="Start timer">Start</button>
        <button id="timer-stop-btn" class="btn-secondary" aria-label="Stop timer">Stop</button>
        <button id="timer-reset-btn" class="btn-secondary" aria-label="Reset timer">Reset</button>
      </div>
      <div class="duration-row">
        <label for="duration-input">Duration (min):</label>
        <input type="number" id="duration-input" min="1" max="120" value="25" aria-label="Timer duration in minutes">
        <button id="duration-save-btn" onclick="saveDuration()">Set</button>
      </div>
      <span id="duration-error" role="alert" style="display:none;">Please enter a whole number between 1 and 120</span>
      <div id="timer-complete-msg" style="display:none;" role="alert">⏰ Time's up! Great work!</div>
    </section>

    <section id="todo-widget" aria-label="To-do list widget">
      <h2>Tasks</h2>
      <div class="todo-input-row">
        <label for="todo-input" class="sr-only">New task</label>
        <input type="text" id="todo-input" placeholder="Add a new task..." aria-label="New task">
        <button id="todo-add-btn" onclick="addTask()">Add</button>
      </div>
      <ul id="todo-list" aria-label="Task list"></ul>
    </section>

  </div>

  <!-- Bottom row: Quick Links -->
  <section id="links-widget" aria-label="Quick links widget">
    <h2>Quick Links</h2>
    <div class="links-input-row">
      <label for="link-label-input" class="sr-only">Link label</label>
      <input type="text" id="link-label-input" placeholder="Link name" aria-label="Link label">
      <label for="link-url-input" class="sr-only">Link URL</label>
      <input type="url" id="link-url-input" placeholder="URL" aria-label="Link URL">
      <button id="link-add-btn" onclick="addLink()">Add Link</button>
    </div>
    <div id="links-container" aria-label="Saved links"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
